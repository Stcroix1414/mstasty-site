<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — MsTasty</title>
  <meta name="description" content="Thoughts, updates, and stream notes from MsTasty." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🍩 <span>MsTasty</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#schedule">Schedule</a></li>
        <li><a href="index.html#stats">Stats</a></li>
        <li><a href="index.html#clips">Clips</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="reef.html">Reef</a></li>
        <li><a href="index.html#socials">Socials</a></li>
      </ul>
      <a href="https://kick.com/ms-tasty" target="_blank" class="btn btn-primary nav-cta">▶ Watch Live</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </nav>

  <div class="blog-page-header">
    <div class="container">
      <div class="section-label reveal">Blog</div>
      <h1 class="reveal" style="font-size: clamp(2.5rem,6vw,5rem); margin-bottom: 14px;">
        All <span class="gradient-text">Posts</span>
      </h1>
      <p class="reveal" style="color: var(--text-muted); font-size: 1.05rem;">
        Thoughts, stream updates, and whatever else is worth writing down.
      </p>
    </div>
  </div>

  <div class="container">
    <div class="blog-page-grid" id="blog-page-grid">
      <!-- filled by blog.js -->
    </div>
    <div class="blog-empty reveal" id="blog-empty" style="display:none">
      <div class="blog-empty-icon">🍩</div>
      <p>No posts yet — check back soon.</p>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <div class="footer-logo">🍩 MsTasty</div>
        <div class="footer-links">
          <a href="https://kick.com/ms-tasty" target="_blank">Kick</a>
          <a href="https://discord.gg/KPm6GtwH9j" target="_blank">Discord</a>
          <a href="https://www.tiktok.com/@mstasty14" target="_blank">TikTok</a>
          <a href="blog.html">Blog</a>
        </div>
        <div class="footer-copy">© 2026 MsTasty · Built with 🍩</div>
      </div>
    </div>
  </footer>

  <script>
    // Nav scroll + mobile
    const nav = document.getElementById('nav');
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('nav-links');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 24), { passive: true });
    if (toggle) toggle.addEventListener('click', () => links.classList.toggle('open'));

    // Reveal
    const ro = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); ro.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

    // Load all posts
    const grid  = document.getElementById('blog-page-grid');
    const empty = document.getElementById('blog-empty');

    fetch('posts.json')
      .then(r => r.ok ? r.json() : [])
      .then(posts => {
        if (!posts.length) { empty.style.display = 'block'; return; }
        posts.forEach((post, i) => {
          const a = document.createElement('a');
          a.href = `posts/${post.slug}.html`;
          a.className = `blog-card reveal reveal-delay-${(i % 3) + 1}`;
          if (i === 0) a.classList.add('blog-featured');
          a.innerHTML = `
            <div class="blog-card-header">
              ${post.tag ? `<span class="blog-tag">${post.tag}</span>` : ''}
              <div class="blog-card-title">${post.title}</div>
            </div>
            <p class="blog-card-excerpt">${post.excerpt}</p>
            <div class="blog-card-footer">
              <span>${post.date}</span>
              <span class="blog-read-more">Read →</span>
            </div>
          `;
          grid.appendChild(a);
          ro.observe(a);
        });
      })
      .catch(() => { empty.style.display = 'block'; });
  </script>
</body>
</html>
