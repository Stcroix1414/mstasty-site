<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Footage — MsTasty</title>
  <meta name="description" content="Aerial footage shot by MsTasty. 4K drone videos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .drone-header {
      padding: 120px 0 60px;
      text-align: center;
    }
    .drone-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      padding-bottom: 80px;
    }
    .drone-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .drone-card:hover {
      border-color: var(--border-purple);
    }
    .drone-video-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
    }
    .drone-video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .drone-card-info {
      padding: 20px 24px;
    }
    .drone-card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .drone-card-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .drone-empty {
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
    }
    .drone-empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <nav id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🍩 <span>MsTasty</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#schedule">Schedule</a></li>
        <li><a href="index.html#stats">Stats</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="index.html#socials">Socials</a></li>
      </ul>
      <a href="https://kick.com/ms-tasty" target="_blank" class="btn btn-primary nav-cta">▶ Watch Live</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </nav>

  <div class="drone-header">
    <div class="container">
      <div class="section-label reveal">Drone</div>
      <h1 class="reveal" style="font-size: clamp(2.5rem,6vw,5rem); margin-bottom: 14px;">
        Aerial <span class="gradient-text">Footage</span>
      </h1>
      <p class="reveal" style="color: var(--text-muted); font-size: 1.05rem;">
        4K drone footage. No commentary. Just the view.
      </p>
    </div>
  </div>

  <div class="container">
    <div class="drone-grid" id="drone-grid">
      <!-- filled by JS -->
    </div>
    <div class="drone-empty" id="drone-empty" style="display:none;">
      <div class="drone-empty-icon">🚁</div>
      <p>No videos yet — check back soon.</p>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <div class="footer-logo">🍩 MsTasty</div>
        <div class="footer-links">
          <a href="https://kick.com/ms-tasty" target="_blank">Kick</a>
          <a href="https://discord.gg/KPm6GtwH9j" target="_blank">Discord</a>
          <a href="https://www.tiktok.com/@mstasty14" target="_blank">TikTok</a>
          <a href="blog.html">Blog</a>
        </div>
        <div class="footer-copy">© 2026 MsTasty · Built with 🍩</div>
      </div>
    </div>
  </footer>

  <script>
    const API = 'https://api.mstasty.live';

    // Nav
    const nav    = document.getElementById('nav');
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('nav-links');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 24), { passive: true });
    if (toggle) toggle.addEventListener('click', () => links.classList.toggle('open'));

    // Reveal
    const ro = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); ro.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

    // Load videos from bot API
    const grid  = document.getElementById('drone-grid');
    const empty = document.getElementById('drone-empty');

    function formatName(filename) {
      return filename
        .replace(/\.[^.]+$/, '')           // strip extension
        .replace(/[-_]/g, ' ')             // dashes/underscores to spaces
        .replace(/\b\w/g, c => c.toUpperCase()); // title case
    }

    fetch(`${API}/api/videos`)
      .then(r => r.ok ? r.json() : [])
      .then(files => {
        if (!files.length) { empty.style.display = 'block'; return; }
        files.forEach((file, i) => {
          const card = document.createElement('div');
          card.className = 'drone-card reveal';
          card.style.animationDelay = `${i * 0.1}s`;
          card.innerHTML = `
            <div class="drone-video-wrap">
              <video controls preload="metadata">
                <source src="${API}/videos/${encodeURIComponent(file)}" type="video/mp4">
              </video>
            </div>
            <div class="drone-card-info">
              <div class="drone-card-title">${formatName(file)}</div>
              <div class="drone-card-meta">4K · Aerial footage</div>
            </div>
          `;
          grid.appendChild(card);
          ro.observe(card);
        });
      })
      .catch(() => { empty.style.display = 'block'; });
  </script>
</body>
</html>
